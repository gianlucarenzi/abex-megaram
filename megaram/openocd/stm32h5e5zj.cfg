# openocd/stm32h5e5zj.cfg — STM32H5E5ZJ (Cortex-M33, 4 MB Flash)
#
# Requires CubeIDE OpenOCD + st_scripts (stm32h5x flash driver non presente
# nell'OpenOCD di sistema).
#
# Uso (vedi flash.sh / halt.sh / reset.sh):
#   $ST_OCD -s $ST_SCRIPTS -f openocd/stm32h5e5zj.cfg -c "..."
#
# Interfaccia: STLINK (V2 o V3).
# Per STLINK-V3 con DAP nativo sostituire "stlink.cfg" con "stlink-dap.cfg"
# e rimuovere "transport select hla_swd".

source [find interface/stlink.cfg]

transport select hla_swd

# Work-area in SRAM1: 16 KB (usata dal flash loader per la programmazione)
set WORKAREASIZE 0x4000

source [find target/stm32h5x.cfg]
